name: Manual OIDC to AWS STS

on:
  push:

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest

    steps:
      - name: Get GitHub OIDC token
        id: token
        run: |
          TOKEN=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" \
            | jq -r '.value')

          echo "TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Print token (DEBUG ONLY - do not use in production)
        run: |
          echo "$TOKEN"

